version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - backend-data:/app
    environment:
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=super_secret_shabar_key_2026_drink_cold
      - DATABASE_FILE=./database.sqlite
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-data:
